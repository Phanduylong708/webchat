<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Socket Test – User 2</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  </head>
  <body>
    <h1>Socket.IO Test – User 2 (phanduylong708)</h1>

    <section>
      <h2>Connection</h2>
      <p>Status: <span id="status">Connecting…</span></p>
    </section>

    <section>
      <h2>Send Message</h2>
      <label>
        Conversation ID:
        <input id="conversation-id" type="number" placeholder="e.g. 1" />
      </label>
      <br />
      <label>
        Recipient ID (for new 1-1):
        <input id="recipient-id" type="number" placeholder="e.g. 4" />
      </label>
      <br />
      <label>
        Content:
        <input id="message-content" type="text" placeholder="Message content" />
      </label>
      <br />
      <button id="send-message">Send Message</button>
    </section>

    <section>
      <h2>Typing Indicator</h2>
      <label>
        Conversation ID:
        <input id="typing-conversation-id" type="number" placeholder="e.g. 1" />
      </label>
      <br />
      <button id="typing-start">typing:start</button>
      <button id="typing-stop">typing:stop</button>
    </section>

    <section>
      <h2>Group Membership</h2>
      <label>
        Conversation ID:
        <input
          id="membership-conversation-id"
          type="number"
          placeholder="Group conversation ID"
        />
      </label>
      <br />
      <label>
        User ID to add (optional):
        <input
          id="membership-user-id"
          type="number"
          placeholder="Leave blank to use current user"
        />
      </label>
      <br />
      <button id="join-group">Join / Add Member</button>
      <button id="leave-group">Leave Group</button>
    </section>

    <section>
      <h2>Logs</h2>
      <pre id="logs"></pre>
    </section>

    <script>
      const logEl = document.getElementById("logs");
      const statusEl = document.getElementById("status");

      function log(label, data) {
        const time = new Date().toISOString();
        logEl.textContent += `[${time}] ${label}: ${JSON.stringify(
          data,
          null,
          2
        )}\n`;
        logEl.scrollTop = logEl.scrollHeight;
        console.log(label, data);
      }

      async function init() {
        const loginRes = await fetch("http://localhost:5000/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            identifier: "phanduylong708@gmail.com",
            password: "adu115",
          }),
        }).then((res) => res.json());

        const token = loginRes?.data?.token;
        const currentUser = loginRes?.data?.user;
        if (!token) {
          statusEl.textContent = "Login failed";
          log("loginError", loginRes);
          return;
        }
        const authHeader = { Authorization: `Bearer ${token}` };
        const jsonAuthHeaders = { ...authHeader, "Content-Type": "application/json" };

        const socket = io("http://localhost:5000", { auth: { token } });
        window.socket = socket;

        socket.on("connect", () => {
          statusEl.textContent = `Connected (${socket.id})`;
          log("connected", { socketId: socket.id });
        });

        socket.on("disconnect", (reason) => {
          statusEl.textContent = `Disconnected (${reason})`;
          log("disconnect", { reason });
        });

        socket.on("connect_error", (err) => {
          statusEl.textContent = "Connect error";
          log("connect_error", { message: err.message, data: err.data });
        });

        socket.on("newMessage", (msg) => log("newMessage", msg));
        socket.on("userTyping", (payload) => log("userTyping", payload));

        document
          .getElementById("send-message")
          .addEventListener("click", () => {
            if (!socket.connected) {
              return log("warn", "Socket not connected");
            }

            const conversationId = Number(
              document.getElementById("conversation-id").value
            );
            const recipientId = Number(
              document.getElementById("recipient-id").value
            );
            const content = document.getElementById("message-content").value;

            const payload = { content };
            if (!Number.isNaN(conversationId) && conversationId > 0) {
              payload.conversationId = conversationId;
            }
            if (!Number.isNaN(recipientId) && recipientId > 0) {
              payload.recipientId = recipientId;
            }

            socket.emit("sendMessage", payload, (ack) => log("ack", ack));
          });

        document
          .getElementById("typing-start")
          .addEventListener("click", () => emitTyping(true));
        document
          .getElementById("typing-stop")
          .addEventListener("click", () => emitTyping(false));
        document
          .getElementById("join-group")
          .addEventListener("click", handleJoinGroup);
        document
          .getElementById("leave-group")
          .addEventListener("click", handleLeaveGroup);

        function emitTyping(isTyping) {
          if (!socket.connected) {
            return log("warn", "Socket not connected");
          }
          const conversationId = Number(
            document.getElementById("typing-conversation-id").value
          );
          if (Number.isNaN(conversationId) || conversationId <= 0) {
            return log("warn", "Typing conversationId is required");
          }
          const event = isTyping ? "typing:start" : "typing:stop";
          socket.emit(event, { conversationId });
          log(`emit ${event}`, { conversationId });
        }

        function getMembershipConversationId() {
          const conversationId = Number(
            document.getElementById("membership-conversation-id").value
          );
          if (Number.isNaN(conversationId) || conversationId <= 0) {
            log("warn", "Membership conversationId is required");
            return null;
          }
          return conversationId;
        }

        async function handleJoinGroup() {
          const conversationId = getMembershipConversationId();
          if (!conversationId) {
            return;
          }
          let userId = Number(
            document.getElementById("membership-user-id").value
          );
          if (Number.isNaN(userId) || userId <= 0) {
            userId = currentUser?.id;
          }
          if (!userId) {
            return log("warn", "User ID is required for join/add action");
          }
          try {
            const res = await fetch(
              `http://localhost:5000/api/conversations/${conversationId}/members`,
              {
                method: "POST",
                headers: jsonAuthHeaders,
                body: JSON.stringify({ userId }),
              }
            );
            const data = await res.json();
            log("joinGroup", { status: res.status, data });
          } catch (error) {
            log("joinGroupError", { message: error.message });
          }
        }

        async function handleLeaveGroup() {
          const conversationId = getMembershipConversationId();
          if (!conversationId) {
            return;
          }
          try {
            const res = await fetch(
              `http://localhost:5000/api/conversations/${conversationId}/leave`,
              {
                method: "DELETE",
                headers: authHeader,
              }
            );
            const data = await res.json().catch(() => ({}));
            log("leaveGroup", { status: res.status, data });
          } catch (error) {
            log("leaveGroupError", { message: error.message });
          }
        }
      }

      init();
    </script>
  </body>
</html>
